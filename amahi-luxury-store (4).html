<title>Amahi Fashion &amp; Designs</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0C0508;--bg2:#160A0D;--card:#1F0E13;--cr:#9B1C2A;--cr2:#C42840;--gd:#C8A24A;--iv:#F5EDE8;--mt:#8F7880;--bd:#28101A}
body{background:var(--bg);color:var(--iv);font-family:Inter,sans-serif;font-size:15px;min-height:100vh}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:400}
*{box-sizing:border-box}
img{display:block;width:100%;height:100%;object-fit:cover}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--cr)}
.ann{background:var(--cr);color:#fff;text-align:center;padding:9px;font-size:11px;letter-spacing:2px;font-weight:500}
header{position:sticky;top:0;z-index:200;background:rgba(12,5,8,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd)}
.hdr{max-width:1440px;margin:0 auto;padding:0 40px;height:74px;display:flex;align-items:center;gap:20px}
.logo-box{background:#fff;padding:6px 14px;border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center}
.logo-box svg{height:40px;width:auto;display:block}
nav{display:flex;gap:18px;flex:1;justify-content:center}
nav a{font-size:10px;letter-spacing:2px;color:var(--mt);cursor:pointer;padding:3px 0;border-bottom:1px solid transparent;transition:all .2s;white-space:nowrap}
nav a:hover,nav a.on{color:var(--iv);border-color:var(--cr)}
.hdr-r{display:flex;align-items:center;gap:12px}
.icn{font-size:10px;letter-spacing:1.5px;color:var(--mt);cursor:pointer;position:relative;padding:4px;transition:color .2s;white-space:nowrap}
.icn:hover{color:var(--cr2)}
.dot{position:absolute;top:-3px;right:-7px;background:var(--cr);color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}
.srch{position:relative}
.srch input{background:var(--bg2);border:1px solid var(--bd);color:var(--iv);padding:7px 11px 7px 30px;border-radius:18px;font-size:12px;width:155px;outline:none;transition:border-color .2s;font-family:Inter,sans-serif}
.srch input:focus{border-color:var(--cr)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mt);font-size:12px;pointer-events:none}
.zari{display:flex;align-items:center;padding:0 40px;max-width:1440px;margin:52px auto}
.zl{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--cr),transparent);opacity:.4}
.zm{color:var(--cr2);padding:0 12px;font-size:13px}
.sec{max-width:1440px;margin:0 auto;padding:0 40px}
.sh{text-align:center;margin-bottom:40px}
.sh h2{font-size:40px;letter-spacing:2px;margin-bottom:7px}
.sh p{color:var(--mt);font-size:10px;letter-spacing:3px}
.eye{font-size:9px;letter-spacing:3px;color:var(--cr2);display:block;margin-bottom:9px}
.hero{position:relative;height:88vh;min-height:560px;overflow:hidden;display:flex;align-items:center}
.hbg{position:absolute;inset:0;object-fit:cover;filter:brightness(.44) saturate(.8)}
.hov{position:absolute;inset:0;background:linear-gradient(120deg,rgba(12,5,8,.92),rgba(12,5,8,.18))}
.hc{position:relative;z-index:2;padding:0 72px;max-width:620px}
.hc h1{font-size:60px;letter-spacing:2px;line-height:1.06;margin-bottom:16px}
.hc p{font-size:14px;color:rgba(245,237,232,.6);margin-bottom:28px;max-width:370px;line-height:1.85}
.hbs{display:flex;gap:10px;flex-wrap:wrap}
.hstag{position:absolute;bottom:0;left:0;right:0;z-index:3;background:rgba(155,28,42,.84);padding:12px 40px;display:flex;justify-content:center;gap:40px;flex-wrap:wrap}
.ht{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.85)}
.bp{background:var(--cr);color:#fff;padding:13px 30px;font-size:10px;letter-spacing:3px;cursor:pointer;border:none;transition:background .2s}
.bp:hover{background:var(--cr2)}
.bo{background:transparent;color:var(--iv);padding:12px 30px;font-size:10px;letter-spacing:3px;border:1px solid rgba(245,237,232,.3);cursor:pointer;transition:all .2s}
.bo:hover{border-color:var(--cr);color:var(--cr2)}
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.cc{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:3/4}
.cc.tall{grid-row:span 2;aspect-ratio:auto}
.cc img{transition:transform .55s}
.cc:hover img{transform:scale(1.07)}
.cov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(12,5,8,.82),rgba(12,5,8,.08) 60%)}
.cl{position:absolute;bottom:20px;left:20px}
.cl em{display:block;font-size:9px;letter-spacing:3px;color:var(--cr2);margin-bottom:2px;font-style:normal}
.cl h3{font-size:22px;letter-spacing:2px;color:var(--iv)}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
.pc{background:var(--card);overflow:hidden;cursor:pointer;transition:transform .25s;border:1px solid #1E0A10}
.pc:hover{transform:translateY(-4px)}
.pci{position:relative;aspect-ratio:3/4;overflow:hidden;background:#1A0B10}
.pci img{transition:transform .5s}
.pc:hover .pci img{transform:scale(1.07)}
.pb{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:4px;z-index:2}
.bsal{background:var(--cr);color:#fff;font-size:9px;letter-spacing:1.5px;padding:3px 8px}
.bnw{background:var(--gd);color:#0C0508;font-size:9px;letter-spacing:1.5px;padding:3px 8px;font-weight:600}
.pw{position:absolute;top:10px;right:10px;z-index:2;width:30px;height:30px;background:rgba(12,5,8,.6);display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--mt);font-size:14px;transition:color .2s;border:none;cursor:pointer}
.pw:hover,.pw.on{color:var(--cr2)}
.pi{padding:13px}
.pcat{font-size:9px;letter-spacing:2px;color:var(--cr2);margin-bottom:3px}
.pnm{font-family:'Cormorant Garamond',serif;font-size:16px;margin-bottom:5px;line-height:1.3}
.pp{display:flex;align-items:baseline;gap:7px;margin-bottom:4px}
.nw{font-size:14px;font-weight:500;color:var(--gd)}
.ws{font-size:11px;color:var(--mt);text-decoration:line-through}
.strs{color:var(--cr2);font-size:10px;margin-bottom:4px}
.padd{width:100%;padding:10px;background:transparent;border:1px solid var(--bd);color:var(--mt);font-size:9px;letter-spacing:2.5px;margin-top:10px;transition:all .2s;cursor:pointer;font-family:Inter,sans-serif}
.padd:hover{background:var(--cr);color:#fff;border-color:var(--cr)}
.shoplay{display:grid;grid-template-columns:200px 1fr;gap:30px;align-items:start}
.flt{position:sticky;top:88px}
.fg{border-bottom:1px solid var(--bd);padding-bottom:14px;margin-bottom:14px}
.fh{font-size:9px;letter-spacing:2.5px;color:var(--mt);margin-bottom:11px;font-family:Inter,sans-serif}
.fo{font-size:13px;color:var(--mt);padding:4px 0;cursor:pointer;transition:color .2s;display:flex;justify-content:space-between;border:none;background:none;width:100%;text-align:left;font-family:Inter,sans-serif}
.fo:hover,.fo.on{color:var(--iv)}
.sbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.sbar p{font-size:12px;color:var(--mt)}
.sbar select{background:var(--bg2);border:1px solid var(--bd);color:var(--iv);padding:6px 10px;font-size:12px;outline:none;cursor:pointer;font-family:Inter,sans-serif}
.dlay{display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:start}
.dimg{aspect-ratio:3/4;overflow:hidden;background:var(--card)}
.di h1{font-size:30px;margin-bottom:8px;line-height:1.25}
.dpr{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.dpr .nw{font-size:21px}
.dbg{background:var(--cr);color:#fff;font-size:9px;padding:3px 9px;letter-spacing:1px}
.dvd{border:none;border-top:1px solid var(--bd);margin:16px 0}
.szs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}

.ff{margin-bottom:14px}

.pt{text-align:center;padding:50px 40px 38px;background:var(--bg2);border-bottom:1px solid var(--bd);margin-bottom:38px}

.pt p{font-size:10px;color:var(--mt);letter-spacing:2px}

.toast.show{opacity:1;transform:translateY(0)}

.fi{max-width:1440px;margin:0 auto;padding:50px 40px 30px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px}

.fc a{display:block;font-size:13px;color:var(--mt);margin-bottom:8px;cursor:pointer;transition:color .2s;text-decoration:none}
.fc a:hover{color:var(--iv)}
.fbot{border-top:1px solid var(--bd);padding:16px 40px;max-width:1440px;margin:0 auto;display:flex;justify-content:space-between;font-size:11px;color:var(--mt)}
.cban{position:relative;height:230px;overflow:hidden}
.cban img{filter:brightness(.38) saturate(.8)}
.cbt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}

.ab{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.ab-im{aspect-ratio:4/5;overflow:hidden}

.bkb:hover{color:var(--cr2)}
.wishlay{max-width:1440px;margin:0 auto;padding:50px 40px}
@media(max-width:900px){
.hdr{padding:0 16px} nav{display:none}
.hc{padding:0 20px}.hc h1{font-size:34px}
.hstag{gap:14px;padding:10px}
.cg{grid-template-columns:1fr 1fr}.cc.tall{grid-row:auto}
.dlay,.shoplay,.chklay,.ab{grid-template-columns:1fr}
.sec,.zari{padding-left:16px;padding-right:16px}
.pg{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.fi{grid-template-columns:1fr 1fr}
.cp{padding:36px 16px}.chklay{padding:36px 16px}.pt{padding:36px 16px 28px}
.wishlay{padding:36px 16px}
}
</style>

function rupee(n){ return "\u20B9" + n.toLocaleString("en-IN"); }
function starStr(r){ var s=""; for(var i=0;i<Math.floor(r);i++) s+="\u2605"; return s; }
function catLabel(id){ for(var i=0;i<CATS.length;i++) if(CATS[i].id===id) return CATS[i].l; return id; }
function getProduct(id){ for(var i=0;i<PRODUCTS.length;i++) if(PRODUCTS[i].id===id) return PRODUCTS[i]; return null; }

function showToast(msg){
  var t = document.getElementById("T");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 2400);
}

function addToCart(pid, sz, q){
  var p = getProduct(pid);
  if(!p) return;
  var k = pid + "-" + sz;
  var found = false;
  for(var i=0;i<cartItems.length;i++){
    if(cartItems[i].k === k){ cartItems[i].q += (q||1); found = true; break; }
  }
  if(!found) cartItems.push({k:k, p:p, sz:sz, q:q||1});
  showToast("Added to bag!");
  render();
}

function removeFromCart(k){
  var next = [];
  for(var i=0;i<cartItems.length;i++) if(cartItems[i].k !== k) next.push(cartItems[i]);
  cartItems = next;
  render();
}

function changeCartQty(k, delta){
  for(var i=0;i<cartItems.length;i++){
    if(cartItems[i].k === k){
      cartItems[i].q += delta;
      if(cartItems[i].q < 1) cartItems.splice(i,1);
      break;
    }
  }
  render();
}

function toggleWishlist(pid){
  var idx = wishItems.indexOf(pid);
  if(idx >= 0){ wishItems.splice(idx,1); showToast("Removed from wishlist"); }
  else { wishItems.push(pid); showToast("Saved to wishlist!"); }
  render();
}

function cartTotal(){ var t=0; for(var i=0;i<cartItems.length;i++) t+=cartItems[i].p.price*cartItems[i].q; return t; }
function cartCount(){ var t=0; for(var i=0;i<cartItems.length;i++) t+=cartItems[i].q; return t; }
function isWished(pid){ return wishItems.indexOf(pid)>=0; }

function goPage(p, extra){
  page = p;
  if(extra){
    if(extra.cat !== undefined) filterCat = extra.cat;
    if(extra.id !== undefined){ detailId = extra.id; selSize="M"; selQty=1; }
    if(extra.search !== undefined) filterSearch = extra.search;
  }
  render();
  window.scrollTo(0,0);
}

function buildCard(p){
  var w = isWished(p.id);
  var disc = p.og ? Math.round((1-p.price/p.og)*100) : 0;
  var badge = p.badge==="sale" ? '<div class="pb"><span class="bsal">SALE '+disc+'%</span></div>'
    : p.badge==="new" ? '<div class="pb"><span class="bnw">NEW</span></div>' : '<div class="pb"></div>';

    +'<div class="pci">'
    +'<img src="'+p.img+'" alt="'+p.name+'" loading="lazy"/>'
    +badge

function buildShop(){
  var pr = [];
  for(var i=0;i<PRODUCTS.length;i++){
    var p=PRODUCTS[i];
    if(filterCat!=="all" && p.cat!==filterCat) continue;
    if(filterSearch && (p.name+p.fab).toLowerCase().indexOf(filterSearch.toLowerCase())<0) continue;
    if(p.price>filterMaxP) continue;
    pr.push(p);
  }
  if(filterSort==="low") pr.sort(function(a,b){return a.price-b.price;});
  else if(filterSort==="high") pr.sort(function(a,b){return b.price-a.price;});
  else if(filterSort==="star") pr.sort(function(a,b){return b.rating-a.rating;});

  var bi = filterCat!=="all" && BIMG[filterCat];

// ===== MAIN RENDER =====
function render(){
  try {

    else if(page==="cart") body = buildCart();
    else if(page==="checkout") body = buildCheckout();

    else body = buildHome();
    document.getElementById("app").innerHTML = buildHeader() + "<main>" + body + "</main>" + buildFooter();
  } catch(e) {
    document.getElementById("app").innerHTML = '<div style="color:#C42840;padding:30px;font-family:monospace">ERROR: '+e.message+'<br/>'+e.stack+'</div>';
  }
}
