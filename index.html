<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Amahi Fashion & Designs — Luxury Indian Ethnic Wear</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0508;
  --bg2:#160A0D;
  --bg3:#1D0E12;
  --card:#220E13;
  --crim:#9B1C2A;
  --crim2:#C42840;
  --gold:#C8A24A;
  --gold2:#E8D08A;
  --ivory:#F6EEE8;
  --muted:#907880;
  --border:#2A1018;
  --bdark:#1E0A10;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ivory);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:400}
img{display:block;width:100%;height:100%;object-fit:cover}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--crim)}

/* ANNOUNCEMENT BAR */
.ann{background:var(--crim);color:#fff;text-align:center;padding:9px 16px;font-size:11px;letter-spacing:2px;font-weight:500}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(12,5,8,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.hdr{max-width:1440px;margin:0 auto;padding:0 48px;height:78px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.logo-box{background:#fff;padding:7px 14px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.logo-box img{height:44px;width:auto;object-fit:contain;display:block}
nav{display:flex;gap:22px}
nav a{font-size:10px;letter-spacing:2.5px;color:var(--muted);transition:color .2s;cursor:pointer;padding:4px 0;border-bottom:1px solid transparent;white-space:nowrap}
nav a:hover,nav a.on{color:var(--ivory);border-bottom-color:var(--crim)}
.hr{display:flex;align-items:center;gap:14px}
.icn{font-size:11px;color:var(--muted);transition:color .2s;cursor:pointer;position:relative;letter-spacing:1.5px;padding:5px;white-space:nowrap}
.icn:hover{color:var(--crim2)}
.dot{position:absolute;top:-3px;right:-6px;background:var(--crim);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.srch{position:relative}
.srch input{background:var(--bg2);border:1px solid var(--border);color:var(--ivory);padding:8px 12px 8px 34px;border-radius:20px;font-size:12px;width:160px;outline:none;transition:border-color .2s}
.srch input:focus{border-color:var(--crim)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}

/* ZARI DIVIDER */
.zari{display:flex;align-items:center;padding:0 48px;max-width:1440px;margin:60px auto}
.zl{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--crim),transparent);opacity:.4}
.zm{color:var(--crim2);font-size:14px;padding:0 14px}

/* SECTIONS */
.sec{max-width:1440px;margin:0 auto;padding:0 48px}
.sh{text-align:center;margin-bottom:48px}
.sh h2{font-size:44px;letter-spacing:2px;margin-bottom:8px}
.sh p{color:var(--muted);font-size:10px;letter-spacing:3px}
.eye{font-size:9px;letter-spacing:3px;color:var(--crim2);display:block;margin-bottom:10px}

/* HERO */
.hero{position:relative;height:90vh;min-height:580px;overflow:hidden;display:flex;align-items:center}
.hbg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.48) saturate(.85)}
.hov{position:absolute;inset:0;background:linear-gradient(125deg,rgba(12,5,8,.92) 0%,rgba(12,5,8,.22) 100%)}
.hc{position:relative;z-index:2;padding:0 80px;max-width:660px}
.hc h1{font-size:66px;letter-spacing:2px;line-height:1.06;margin-bottom:18px}
.hc p{font-size:14px;color:rgba(246,238,232,.6);letter-spacing:.5px;margin-bottom:30px;max-width:390px;line-height:1.85}
.hbs{display:flex;gap:12px;flex-wrap:wrap}
.btn-p{background:var(--crim);color:#fff;padding:14px 34px;font-size:10px;letter-spacing:3px;font-weight:500;border:none;cursor:pointer;transition:background .2s}
.btn-p:hover{background:var(--crim2)}
.btn-o{background:transparent;color:var(--ivory);padding:13px 34px;font-size:10px;letter-spacing:3px;border:1px solid rgba(246,238,232,.3);cursor:pointer;transition:all .2s}
.btn-o:hover{border-color:var(--crim);color:var(--crim2)}
/* HERO accent bar */
.hero-tag{position:absolute;bottom:0;left:0;right:0;z-index:3;background:rgba(155,28,42,.85);backdrop-filter:blur(8px);padding:14px 48px;display:flex;justify-content:center;gap:56px}
.ht-item{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.8)}
.ht-item span{color:#fff;font-size:14px}

/* CATEGORIES */
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.cc{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:3/4}
.cc.tall{grid-row:span 2;aspect-ratio:auto}
.cc img{transition:transform .55s ease;width:100%;height:100%;object-fit:cover}
.cc:hover img{transform:scale(1.07)}
.cov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(12,5,8,.82) 0%,rgba(12,5,8,.1) 60%)}
.cl{position:absolute;bottom:22px;left:22px}
.cl em{display:block;font-size:9px;letter-spacing:3px;color:var(--crim2);margin-bottom:3px;font-style:normal}
.cl h3{font-size:24px;letter-spacing:2px;color:var(--ivory)}

/* PRODUCT GRID */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:20px}
.pc{background:var(--card);overflow:hidden;cursor:pointer;transition:transform .25s;border:1px solid var(--bdark)}
.pc:hover{transform:translateY(-4px)}
.pci{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--bg3)}
.pci img{transition:transform .5s ease}
.pc:hover .pci img{transform:scale(1.07)}
.pb{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:4px;z-index:2}
.bsal{background:var(--crim);color:#fff;font-size:9px;letter-spacing:1.5px;padding:3px 8px}
.bnew{background:var(--gold);color:#0C0508;font-size:9px;letter-spacing:1.5px;padding:3px 8px;font-weight:600}
.pw{position:absolute;top:10px;right:10px;z-index:2;width:30px;height:30px;background:rgba(12,5,8,.65);display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--muted);font-size:14px;transition:all .2s}
.pw:hover,.pw.on{color:var(--crim2)}
.pi{padding:14px}
.pcat{font-size:9px;letter-spacing:2px;color:var(--crim2);margin-bottom:3px}
.pname{font-family:'Cormorant Garamond',serif;font-size:16px;margin-bottom:6px;line-height:1.3}
.pp{display:flex;align-items:baseline;gap:8px}
.pp .now{font-size:14px;font-weight:500;color:var(--gold)}
.pp .was{font-size:12px;color:var(--muted);text-decoration:line-through}
.stars{color:var(--crim2);font-size:10px;letter-spacing:1px;margin-bottom:4px}
.padd{width:100%;padding:10px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:9px;letter-spacing:2.5px;margin-top:11px;transition:all .2s}
.padd:hover{background:var(--crim);color:#fff;border-color:var(--crim)}

/* SHOP LAYOUT */
.sl{display:grid;grid-template-columns:205px 1fr;gap:36px;align-items:start}
.filters{position:sticky;top:92px}
.fg{border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:16px}
.fh{font-family:'Inter',sans-serif;font-size:9px;letter-spacing:2.5px;color:var(--muted);margin-bottom:12px}
.fo{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;font-size:13px;color:var(--muted);transition:color .2s}
.fo:hover,.fo.on{color:var(--ivory)}
.sbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.sbar p{font-size:12px;color:var(--muted)}
.sbar select{background:var(--bg2);border:1px solid var(--border);color:var(--ivory);padding:7px 11px;font-size:12px;outline:none;cursor:pointer}

/* PRODUCT DETAIL */
.dl{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start}
.dimg{aspect-ratio:3/4;overflow:hidden;background:var(--card)}
.di h1{font-size:32px;margin-bottom:9px;line-height:1.25}
.dp{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.dp .now{font-size:22px;color:var(--gold)}
.dp .was{font-size:13px;color:var(--muted);text-decoration:line-through}
.dbg{background:var(--crim);color:#fff;font-size:9px;padding:3px 9px;letter-spacing:1px}
.dvd{border:none;border-top:1px solid var(--border);margin:18px 0}
.sw p{font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:9px}
.szs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.sb{padding:7px 13px;border:1px solid var(--border);font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s;background:transparent}
.sb:hover,.sb.on{border-color:var(--crim);color:var(--ivory)}
.qw{display:flex;align-items:center;border:1px solid var(--border);width:fit-content;margin-bottom:14px}
.qb{padding:9px 14px;font-size:15px;color:var(--muted);cursor:pointer;transition:color .2s}
.qb:hover{color:var(--crim2)}
.qn{padding:9px 18px;border-left:1px solid var(--border);border-right:1px solid var(--border);font-size:14px;min-width:48px;text-align:center}
.acb{width:100%;padding:15px;background:var(--crim);color:#fff;font-size:10px;letter-spacing:3px;cursor:pointer;border:none;margin-bottom:8px;transition:background .2s;font-family:'Inter',sans-serif;font-weight:500}
.acb:hover{background:var(--crim2)}
.wb{width:100%;padding:14px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:10px;letter-spacing:3px;cursor:pointer;transition:all .2s}
.wb:hover{border-color:var(--crim);color:var(--crim2)}
.dm p{font-size:12px;color:var(--muted);margin-bottom:6px}
.dm span{color:var(--ivory)}

/* CART */
.cpage{max-width:1050px;margin:0 auto;padding:56px 48px}
.citems{border-top:1px solid var(--border)}
.citem{display:grid;grid-template-columns:96px 1fr auto;gap:18px;align-items:start;padding:22px 0;border-bottom:1px solid var(--border)}
.ctb{background:var(--card);padding:26px;margin-top:28px;border:1px solid var(--border)}
.ctr{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px;color:var(--muted)}
.ctr.big{font-size:17px;color:var(--ivory);font-weight:500;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}

/* CHECKOUT */
.chk{display:grid;grid-template-columns:1fr 360px;gap:44px;max-width:1100px;margin:0 auto;padding:56px 48px}
.fg2{margin-bottom:16px}
.fg2 label{display:block;font-size:9px;letter-spacing:1.5px;color:var(--muted);margin-bottom:7px}
.fg2 input,.fg2 select{width:100%;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);color:var(--ivory);font-size:13px;outline:none;transition:border-color .2s}
.fg2 input:focus,.fg2 select:focus{border-color:var(--crim)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.osb{background:var(--card);padding:26px;border:1px solid var(--border);height:fit-content;position:sticky;top:92px}
.oi{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}

/* PAGE TITLE */
.pt{text-align:center;padding:56px 48px 44px;background:var(--bg2);border-bottom:1px solid var(--border);margin-bottom:44px}
.pt h1{font-size:50px;letter-spacing:3px;margin-bottom:7px}
.pt p{font-size:10px;color:var(--muted);letter-spacing:2px}
.bc{font-size:10px;color:var(--muted);margin-bottom:10px}
.bc span{color:var(--crim2)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--crim);color:#fff;padding:12px 22px;font-size:12px;letter-spacing:1px;z-index:9999;opacity:0;transform:translateY(16px);transition:all .3s;pointer-events:none;font-weight:500;border-left:3px solid var(--gold)}
.toast.show{opacity:1;transform:translateY(0)}

/* FOOTER */
footer{background:var(--bg2);border-top:1px solid var(--border);margin-top:80px}
.fi{max-width:1440px;margin:0 auto;padding:56px 48px 36px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px}
.fb-logo{background:#fff;padding:8px 14px;border-radius:3px;display:inline-flex;width:fit-content;margin-bottom:14px}
.fb-logo img{height:40px;width:auto;object-fit:contain}
.fb p{font-size:13px;color:var(--muted);max-width:240px;line-height:1.75}
.fc h4{font-size:9px;letter-spacing:3px;color:var(--crim2);margin-bottom:16px}
.fc a{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;cursor:pointer;transition:color .2s}
.fc a:hover{color:var(--ivory)}
.fbot{border-top:1px solid var(--border);padding:18px 48px;max-width:1440px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted)}
.socials{display:flex;gap:14px}
.socials a{color:var(--muted);font-size:12px;letter-spacing:1px;cursor:pointer;transition:color .2s}
.socials a:hover{color:var(--crim2)}

/* CAT BANNER */
.cban{position:relative;height:250px;overflow:hidden}
.cban img{width:100%;height:100%;object-fit:cover;filter:brightness(.42) saturate(.8)}
.cban-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.cban-txt h1{font-size:46px;letter-spacing:3px}
.cban-txt p{font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:6px}

/* ABOUT SPLIT */
.ab{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
.ab-img{aspect-ratio:4/5;overflow:hidden}

/* EMPTY */
.es{text-align:center;padding:72px 20px}
.es h2{font-size:28px;margin-bottom:10px;color:var(--muted);font-family:'Cormorant Garamond',serif}

/* BACK BTN */
.bk{display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:2px;color:var(--muted);cursor:pointer;margin-bottom:26px;transition:color .2s;background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 48px;max-width:100%;width:100%}
.bk:hover{color:var(--crim2)}

/* BRAND STRIP */
.bstrip{background:var(--crim);padding:18px 48px;display:flex;justify-content:center;align-items:center;gap:8px;font-size:11px;letter-spacing:2px;color:#fff}
.bstrip a{color:#fff;text-decoration:underline;font-weight:500}

@media(max-width:960px){
  .hdr{padding:0 20px}.logo-box img{height:36px}
  nav{display:none}
  .hc{padding:0 24px}.hc h1{font-size:38px}
  .hero-tag{gap:20px;padding:12px 20px;flex-wrap:wrap}
  .cg{grid-template-columns:repeat(2,1fr)}.cc.tall{grid-row:auto}
  .dl,.sl,.chk,.ab{grid-template-columns:1fr}
  .sec{padding:0 20px}.zari{padding:0 20px}
  .pg{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
  .fi{grid-template-columns:1fr 1fr}
  .fbot,.cpage,.chk{padding-left:20px;padding-right:20px}
  .pt{padding:40px 20px 30px}
}
</style>
</head>

function pcard(p){
  const w=S.wish.includes(p.id),disc=p.og?Math.round((1-p.price/p.og)*100):0;
  return `<div class="pc" onclick="openP(${p.id})">

      <img src="${p.img}" alt="${p.name}" loading="lazy"/>
      <div class="pb">${p.badge==='sale'?`<span class="bsal">SALE ${disc}%</span>`:''} ${p.badge==='new'?'<span class="bnew">NEW</span>':''}</div>
      <button class="pw ${w?'on':''}" onclick="event.stopPropagation();toggleWish(${p.id})">${w?'♥':'♡'}</button>
    </div>
    <div class="pi">
      <div class="pcat">${cl(p.cat).toUpperCase()}</div>
      <div class="stars">${stars(p.rating)} <small style="color:var(--muted)">${p.rating}</small></div>

      <div class="pp"><span class="now">${fmt(p.price)}</span>${p.og?`<span class="was">${fmt(p.og)}</span>`:''}</div>
      <button class="padd" onclick="event.stopPropagation();addCart(PRODUCTS.find(x=>x.id===${p.id}),'M',1)">ADD TO BAG</button>

  </div>`;
}
